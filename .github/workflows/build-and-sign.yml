name: Build and Sign (SignPath)

# 使用 SignPath 免费开源签名服务
# 需要先在 https://signpath.org 注册并申请

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: desktop
        run: npm install
        
      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: desktop
        run: npm run build:mac
        
      - name: Build Electron app (Windows - Unsigned)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        run: npm run build:win
        env:
          # 暂时构建未签名版本
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
        
      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: desktop
        run: npm run build:linux
        
      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: desktop/release/*.dmg
          
      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-unsigned
          path: desktop/release/*.exe
          
      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: desktop/release/*.AppImage

  # SignPath 签名 (需要先注册申请)
  sign:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-unsigned
          path: artifacts/windows
        
      - name: Install SignPath CLI
        run: |
          dotnet tool install --global SignPath.Client.Cmd
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
        
      - name: Submit for signing
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORG_ID: ${{ secrets.SIGNPATH_ORG_ID }}
          SIGNPATH_PROJECT_SLUG: 'deepseek-agent'
        run: |
          # 查找未签名的 exe 文件
          UNSIGNED_EXE=$(find artifacts/windows -name "*.exe" -type f | head -1)
          
          if [ -n "$UNSIGNED_EXE" ]; then
            signpath submit \
              --api-token "$SIGNPATH_API_TOKEN" \
              --organization-id "$SIGNPATH_ORG_ID" \
              --project-slug "$SIGNPATH_PROJECT_SLUG" \
              --signing-policy-slug "release-signing" \
              --artifact-configuration-slug "electron-app" \
              --input-artifact-path "$UNSIGNED_EXE" \
              --output-artifact-path "signed/DeepSeek-Agent-Desktop-Setup-1.0.0.exe" \
              --wait-for-completion \
              --wait-timeout 600
          fi
        
      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-build-signed
          path: signed/*.exe

  release:
    needs: [build, sign]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # 如果签名失败，仍然发布未签名版本
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create extension zip
        run: |
          cd extension
          zip -r ../deepseek-agent-extension.zip .
          
      - name: List files
        run: |
          echo "=== Artifacts ==="
          find artifacts -type f 2>/dev/null || true
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-build/*
            artifacts/windows-build-signed/*
            artifacts/windows-build-unsigned/*
            artifacts/linux-build/*
            deepseek-agent-extension.zip
          body: |
            # DeepSeek Agent ${{ github.ref_name }}
            
            ## 📥 下载
            
            ### 桌面应用
            | 平台 | 文件 | 状态 |
            |------|------|------|
            | Windows | `DeepSeek-Agent-Desktop-Setup-1.0.0.exe` | ✅ 已签名 |
            | macOS | `DeepSeek-Agent-Desktop-1.0.0.dmg` | 未签名 |
            | Linux | `DeepSeek-Agent-Desktop-1.0.0.AppImage` | - |
            
            ### 浏览器插件
            - `deepseek-agent-extension.zip` - 支持 Chrome/Edge/Firefox
            
            ## 📖 使用说明
            1. 下载并安装对应平台的桌面应用
            2. 启动应用，选择工作空间目录
            3. 在浏览器中加载插件 (开发者模式)
            4. 访问 chat.deepseek.com 使用 Agent 功能
            
            ## 🔐 关于签名
            - Windows 版本已使用 SignPath 免费开源证书签名
            - 首次运行可能仍会提示"未知发布者"，点击"更多信息"→"仍要运行"即可
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
